<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>點點富婆</title>

<script>
window.APP_CONFIG = {
  PIXEL_ID: '26304479809157137',
  LINE_URL: 'https://lin.ee/jzABNet',
  REDIRECT_DELAY: 700
};

!function(f,b,e,v,n,t,s){
  if(f.fbq) return;
  n=f.fbq=function(){
    n.callMethod ? n.callMethod.apply(n,arguments) : n.queue.push(arguments);
  };
  if(!f._fbq) f._fbq=n;
  n.push=n;
  n.loaded=!0;
  n.version='2.0';
  n.queue=[];
  t=b.createElement(e);
  t.async=!0;
  t.src=v;
  s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s);
}(window, document, 'script', 'https://connect.facebook.net/en_US/fbevents.js');

fbq('init', window.APP_CONFIG.PIXEL_ID);
fbq('trackSingle', window.APP_CONFIG.PIXEL_ID, 'PageView');
</script>

<noscript>
  <img
    height="1"
    width="1"
    style="display:none"
    alt=""
    src="https://www.facebook.com/tr?id=26304479809157137&ev=PageView&noscript=1"
  />
</noscript>

<style>
body{
  margin:0;
  background:#000;
  font-family:system-ui,-apple-system,"PingFang TC","Noto Sans TC",Arial;
}
.wrapper{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  min-height:100dvh;
}
.frame{
  position:relative;
  width:100%;
  max-width:420px;
  aspect-ratio:9/16;
  overflow:hidden;
}
.bg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}
.logo{
  position:absolute;
  top:5%;
  left:10%;
  transform:translateX(10%);
  width:60%;
}
.ip{
  position:absolute;
  bottom:30%;
  left:50%;
  transform:translateX(-50%);
  width:90%;
}
.btnWrapper{
  position:absolute;
  bottom:3%;
  left:50%;
  transform:translateX(-50%);
  width:80%;
}
#lineBtn{
  display:block;
}
.btn{
  width:100%;
  cursor:pointer;
  display:block;
  animation:breath 1.8s ease-in-out infinite;
}
@keyframes breath{
  0%{transform:scale(1);}
  50%{transform:scale(1.08);}
  100%{transform:scale(1);}
}
</style>
</head>

<body>
<div class="wrapper">
  <div class="frame">
    <img src="assets/bg.jpg" class="bg" alt="">
    <img src="assets/logo.png" class="logo" alt="">
    <img src="assets/ip.png" class="ip" alt="">

    <div class="btnWrapper">
      <a href="https://lin.ee/jzABNet" id="lineBtn" aria-label="加入 LINE">
        <img src="assets/btn.png" class="btn" alt="立即加入 LINE">
      </a>
    </div>
  </div>
</div>

<script>
(function(){
  const PIXEL_ID = window.APP_CONFIG.PIXEL_ID;
  const LINE_URL = window.APP_CONFIG.LINE_URL;
  const REDIRECT_DELAY = window.APP_CONFIG.REDIRECT_DELAY;

  const lineBtn = document.getElementById('lineBtn');
  if (!lineBtn) return;

  let isRedirecting = false;
  let redirectTimer = null;

  function createEventId(){
    if (window.crypto && typeof window.crypto.randomUUID === 'function') {
      return window.crypto.randomUUID();
    }
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c){
      const r = Math.random() * 16 | 0;
      const v = c === 'x' ? r : (r & 0x3 | 0x8);
      return v.toString(16);
    });
  }

  function resetButtonState(){
    isRedirecting = false;

    if (redirectTimer) {
      clearTimeout(redirectTimer);
      redirectTimer = null;
    }

    lineBtn.style.pointerEvents = '';
  }

  function goToLine(){
    window.location.href = LINE_URL;
  }

  window.addEventListener('pageshow', function(){
    resetButtonState();
  });

  lineBtn.addEventListener('click', function(e){
    if (isRedirecting) {
      e.preventDefault();
      return;
    }

    e.preventDefault();
    isRedirecting = true;
    lineBtn.style.pointerEvents = 'none';

    const eventId = createEventId();
    const params = {
      content_name: 'line_click'
    };
    const options = {
      eventID: eventId
    };

    try{
      if (typeof fbq === 'function') {
        fbq('trackSingle', PIXEL_ID, 'Contact', params, options);
      }
    }catch(err){}

    redirectTimer = setTimeout(goToLine, REDIRECT_DELAY);
  });
})();
</script>

</body>
</html>
